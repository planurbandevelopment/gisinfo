<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>GISinfo Map</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    
<!-- Load the actual MapLibre JavaScript Engine -->
<script src="/npm/github-markdown-css@2.4.1/github-markdown.min.css"></script>

<!-- Load the actual MapLibre Layout Styling Sheet -->
<link href="https://cdn.jsdelivr.net/npm/jquery@3.6.4/src/core.min.js" rel="stylesheet" />
    
    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; height: 100vh; }
        .maplibregl-popup { max-width: 400px; font: 12px/20px 'Helvetica Neue', Arial, sans-serif; }
    </style>
</head>
<body>

<div id="map"></div>

<script>
    const map = new maplibregl.Map({
        container: 'map',
        style: {
            "version": 8,
            "sources": {},
            "layers": []
        },      
        center: [26.5, -32.125], // Positioned default zoom window over Eastern Cape region
        zoom: 7
    });

    map.on('load', () => {
        // FIX 2: Corrected the full repository and server deployment file path
        map.addSource('gisinfo', {
            type: 'vector',
            tiles: [
                'https://planurbandevelopment.github.io{z}/{x}/{y}.pbf'
            ],
            minzoom: 6,
            maxzoom: 18
        });

        // Step 2: Define and group your 34 source layers for batch rendering
        const polygonLayers = [
            'Public Open Space', 'Farms_Parastatal', 'Farms_DWS', 'Farms_Municipal', 
            'Farms_State Land in Trust', 'Farms_DPWI National', 'Farms_DPWI Provincial', 
            'Farms_DLRRD', 'DPWI Asset Register Farms', 'Farm portions', 'Parent farms', 
            'Erven_DHS', 'Erven_Prastatal', 'Erven_DPWI National', 'Erven_DPWI Provincial', 
            'Erven_DLRRD', 'Erven_Municipality', 'DPWI Asset Register Erven', 'Erven', 
            'Holdings', 'Lease areas', 'Mineral Rights', 'Servitude areas', 
            'Registration Division', 'Towns', 'Local Municipalities',  'General plans', 
            'District Municipalities', 'Metropolitan Municipality', 'Eastern Cape', 
        ];

        const lineLayers = ['Streets', 'HV Lines 20140207', 'MV Lines', 'Established Boundary'];
        const pointLayers = ['Beacon'];

        // Step 3: Draw out the Polygons dynamically (Cadastrals, Farms, Boundaries)
        polygonLayers.forEach(layerName => {
            map.addLayer({
                'id': layerName,
                'type': 'fill',
                'source': 'gisinfo',
                'source-layer': layerName,
                'paint': {
                    'fill-color': layerName.includes('Farm') ? '#d7ccc8' : '#e0f2f1', // Split hue logic by dataset types
                    'fill-opacity': 0.35,
                    'fill-outline-color': '#37474f'
                }
            });
        });

        // Step 4: Draw out the Infrastructure and Boundary Lines
        lineLayers.forEach(layerName => {
            map.addLayer({
                'id': layerName,
                'type': 'line',
                'source': 'gisinfo',
                'source-layer': layerName,
                'paint': {
                    'line-color': layerName.includes('Lines') ? '#e53935' : '#757575', // Electrical grids appear red, streets grey
                    'line-width': layerName.includes('HV Lines') ? 2.5 : 1.2
                }
            });
        });

        // Step 5: Draw out the Point Beacons and Plans
        pointLayers.forEach(layerName => {
            map.addLayer({
                'id': layerName,
                'type': 'circle',
                'source': 'gisinfo',
                'source-layer': layerName,
                'paint': {
                    'circle-radius': 5,
                    'circle-color': '#ffb300',
                    'circle-stroke-width': 1,
                    'circle-stroke-color': '#000000'
                }
            });
        });

        // Step 6: Interactive generic popup controller across ALL polygon parcels
        polygonLayers.forEach(layerName => {
            map.on('click', layerName, (e) => {
                // Ensure features exist to prevent undefined popup script failures
                if (!e.features || e.features.length === 0) return;
                
                const properties = e.features[0].properties;
                
                // Loops through whatever attributes exist in that specific QGIS layer file table
                let popupContent = `<div style="max-height:200px; overflow-y:auto;">
                                    <h3 style="margin:5px 0;">Dataset: ${layerName.replace('_', ' ')}</h3>
                                    <table border="1" style="border-collapse:collapse; width:100%; font-family:sans-serif; font-size:11px;">`;
                
                for (const [key, value] of Object.entries(properties)) {
                    popupContent += `<tr><td style="padding:4px; background:#f5f5f5;"><b>${key}</b></td><td style="padding:4px;">${value}</td></tr>`;
                }
                popupContent += `</table></div>`;

                new maplibregl.Popup()
                    .setLngLat(e.lngLat)
                    .setHTML(popupContent)
                    .addTo(map);
                
                e.stopPropagation(); // Stop click events stacking up through layered overlapping lines
            });

            // Handlers for switching cursor pointers smoothly on interactive hover
            map.on('mouseenter', layerName, () => { map.getCanvas().style.cursor = 'pointer'; });
            map.on('mouseleave', layerName, () => { map.getCanvas().style.cursor = ''; });
        });
    });
</script>

</body>
</html>
